build: false
version: 0.7.3.{build}
image: Visual Studio 2019
clone_depth: 1

environment:
  matrix:
    - CONFIGURATION: Release
      PLATFORM: Win32
    - CONFIGURATION: Debug
      PLATFORM: Win32
    - CONFIGURATION: Release
      PLATFORM: x64
    - CONFIGURATION: Debug
      PLATFORM: x64

build_script:
  - msbuild "graphstudionext.v142.sln" ^
      /m ^
      /t:graphstudionext ^
      /p:Configuration=%CONFIGURATION% ^
      /p:Platform=%PLATFORM%

artifacts:
  - path: bin\**\*
